<div class="section">
    <div class="section-title">
        <label>HAND POSITION</label>
    </div>
    <div class="section-options">
        <div class="section-option low">
            <label>NATURAL</label>
            <input value="NATURAL" type="radio" name="hand-position-group" [(ngModel)]="handPosition" (change)="onOptionChange()">
        </div>
        <div class="section-option high">
            <label>NOT NATURAL</label>
            <input value="NOT_NATURAL" type="radio" name="hand-position-group" [(ngModel)]="handPosition" (change)="onOptionChange()">
        </div>
    </div>
</div>
