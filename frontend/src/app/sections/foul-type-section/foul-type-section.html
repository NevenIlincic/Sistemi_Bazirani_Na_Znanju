<div class="section">
    <div class="section-title">
        <label>FOUL TYPE</label>
    </div>
    <div class="section-options">
        <div class="section-option low">
            <label>NON EXISTENT</label>
            <input value="NON_EXISTENT" type="radio" name="foul-type-group" [(ngModel)]="foulType" (change)="onOptionChange()">
        </div>
        <div class="section-option low">
            <label>CARELESS</label>
            <input value="CARELESS" type="radio" name="foul-type-group" [(ngModel)]="foulType" (change)="onOptionChange()">
        </div>
        <div class="section-option medium">
            <label>RECKLESS</label>
            <input value="RECKLESS" type="radio" name="foul-type-group" [(ngModel)]="foulType" (change)="onOptionChange()">
        </div>
        <div class="section-option high">
            <label>EXCESSIVE</label>
            <input value="EXCESSIVE" type="radio" name="foul-type-group" [(ngModel)]="foulType" (change)="onOptionChange()">
        </div>
    </div>
</div>
