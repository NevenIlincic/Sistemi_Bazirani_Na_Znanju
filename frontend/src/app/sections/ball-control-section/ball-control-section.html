<div class="section">
    <div class="section-title">
        <label>ATTACKER BALL CONTROL</label>
    </div>
    <div class="section-options">
        <div class="section-option neutral">
            <label>YES</label>
            <input value="YES" type="radio" name="ball-control-group" [(ngModel)]="attackerBallControl" (change)="onOptionChange()">
        </div>
        <div class="section-option neutral">
            <label>NO</label>
            <input value="NO" type="radio" name="ball-control-group" [(ngModel)]="attackerBallControl" (change)="onOptionChange()">
        </div>
    </div>
</div>
